services:
  web:
    env_file:
      - .env.production
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_YANDEX_METRIKA_ID: ${NEXT_PUBLIC_YANDEX_METRIKA_ID:-}
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      PLAYWRIGHT_SKIP_RUNTIME_INSTALL: "1"
      PORT: "3000"
    ports:
      - "${WEB_PORT:-3000}:3000"
    shm_size: "1gb"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
